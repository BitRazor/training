<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0f12">
<title>Training Tracker</title>
<!-- installable PWA: Add to Home Screen launches it standalone (no browser chrome) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230c0f12'/><path d='M7 16h18M11 11v10M21 11v10' stroke='%2334d399' stroke-width='3' fill='none' stroke-linecap='round'/></svg>">
<link rel="stylesheet" href="tracker.css">
</head>
<body>
<header class="appHead">
  <div class="appTitle">Training Tracker</div>
  <div class="headMeta" id="headMeta"></div>
</header>

<main>
  <section class="view" id="view-today"></section>
  <section class="view" id="view-programs" hidden></section>
  <section class="view" id="view-library" hidden></section>
  <section class="view" id="view-log" hidden></section>
  <section class="view" id="view-nutrition" hidden></section>
  <section class="view" id="view-settings" hidden></section>
</main>

<nav class="tabbar">
  <button class="tab sel" data-view="today"><span class="ti">▣</span>Today</button>
  <button class="tab" data-view="programs"><span class="ti">▤</span>Plan</button>
  <button class="tab" data-view="library"><span class="ti">🗂</span>Programs</button>
  <button class="tab" data-view="log"><span class="ti">✎</span>Notes</button>
  <button class="tab" data-view="nutrition"><span class="ti">🍴</span>Fuel</button>
  <button class="tab more" data-view="settings" aria-label="Settings" title="Settings"><span class="ti">⋯</span></button>
</nav>

<input type="file" id="importFile" accept="application/json,.json" hidden>

<script src="tracker-seed.js"></script>
<script src="tracker-desc.js"></script>
<script src="tracker-views.js"></script>
<script src="tracker-plan.js"></script>
<script src="tracker.js"></script>
<script>
/* register the service worker only when served over http(s) — skipped for the offline single-file build (file://) */
if (("serviceWorker" in navigator) && location.protocol.indexOf("http") === 0) {
  window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
}
</script>
</body>
</html>
